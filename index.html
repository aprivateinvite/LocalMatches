<!DOCTYPE html>
<html lang="en" id="html-root">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Meet People Near You Tonight</title>
<meta name="description" content="Discover people near your location and start chatting today.">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Meet People Near You Tonight">
<meta name="twitter:description" content="Discover people near your location and start chatting today.">
<meta name="twitter:image" content="https://raw.githubusercontent.com/aprivateinvite/LocalMatches/main/imagem/image_1.jpeg">

<style>
[v-cloak] { display: none; }

body {
    font-family: Arial, sans-serif;
    margin: 0;
    /* Imagem exclusiva para o fundo da página usando o link Raw do GitHub */
    background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('https://raw.githubusercontent.com/aprivateinvite/LocalMatches/main/imagem/image_2.jpeg') center/cover no-repeat;
    color: white;
    text-align: center;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.hero {
    padding: 100px 20px;
    flex: 1;
}

.cta {
    background: #00BFFF;
    padding: 15px 30px;
    border-radius: 8px;
    display: inline-block;
    color: white;
    text-decoration: none;
    font-weight: bold;
    margin-top: 20px;
    transition: background 0.3s ease;
}

.cta:hover {
    background: #009acd;
}

.online {
    margin-top: 20px;
    font-size: 18px;
    color: #38bdf8;
}

.footer {
    padding: 20px;
    font-size: 12px;
    color: #64748b;
}

.footer a {
    color: #64748b;
    text-decoration: none;
    margin: 0 10px;
}
</style>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js" defer></script>

</head>

<body>

<div id="app" v-cloak>

    <section class="hero">

        <h1>{{ t.headline.replace('{greet}', greet).replace('{city}', city) }}</h1>

        <p>{{ t.subtext.replace('{city}', city) }}</p>

        <div class="online">
            <span>{{ onlineCount }}</span> {{ t.onlineText }}
        </div>

        <a :href="ctaLink" class="cta">{{ t.cta }}</a>

    </section>

    <footer class="footer">
        <a href="#">Privacy Policy</a> | <a href="#">Terms of Service</a> | <span>18+ Only</span>
    </footer>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const { createApp, ref, computed, onMounted } = Vue;

    const translations = {
        en: {
            fallbackCity: "your area",
            greetings: { morning: "Good morning", afternoon: "Good afternoon", evening: "Good evening" },
            headline: "{greet}! People in {city} are looking to meet tonight",
            subtext: "New profiles from {city} joined in the last few minutes",
            onlineText: "people online right now",
            cta: "See Matches"
        },
        pt: {
            fallbackCity: "sua região",
            greetings: { morning: "Bom dia", afternoon: "Boa tarde", evening: "Boa noite" },
            headline: "{greet}! Pessoas em {city} estão querendo um encontro hoje à noite",
            subtext: "Novos perfis de {city} entraram nos últimos minutos",
            onlineText: "pessoas online agora",
            cta: "Ver Perfis"
        }
    };

    const app = createApp({
        setup() {
            const lang = ref("en");
            const city = ref("your area");
            const timeOfDay = ref("evening");
            const onlineCount = ref(0);
            const ctaLink = ref("https://bggcgce.datesoffers.com/s/59cd6ef16fd92");

            const t = computed(() => translations[lang.value] || translations['en']);
            
            const greet = computed(() => {
                return t.value.greetings[timeOfDay.value];
            });

            const initLang = () => {
                const navLang = navigator.language.slice(0, 2);
                if (translations[navLang]) {
                    lang.value = navLang;
                    document.documentElement.lang = navLang;
                    if(city.value === "your area") {
                        city.value = translations[navLang].fallbackCity;
                    }
                }
            };

            const initGeo = async () => {
                try {
                    const res = await fetch('https://get.geojs.io/v1/ip/geo.json');
                    const data = await res.json();
                    if (data.city) city.value = data.city;
                    else if (data.region) city.value = data.region;
                } catch (e) {
                    console.log("Geo fallback failed.");
                }
            };

            const initTime = () => {
                const hour = new Date().getHours();
                if (hour < 12) timeOfDay.value = "morning";
                else if (hour < 18) timeOfDay.value = "afternoon";
                else timeOfDay.value = "evening";
            };

            const initOnlineCount = () => {
                const min = 120;
                const max = 350;
                onlineCount.value = Math.floor(Math.random() * (max - min) + min);
            };

            const initTracking = () => {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.toString()) {
                    const separator = ctaLink.value.includes('?') ? '&' : '?';
                    ctaLink.value = `${ctaLink.value}${separator}${urlParams.toString()}`;
                }
            };

            onMounted(() => {
                initLang();
                initGeo();
                initTime();
                initOnlineCount();
                initTracking();
            });

            return { city, t, greet, onlineCount, ctaLink };
        }
    });

    app.mount('#app');
});
</script>

</body>
</html>
